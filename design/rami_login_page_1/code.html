<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c3bed",
                        "brand-blue": "#2563eb",
                        "background-light": "#f7f6f8",
                        "background-dark": "#0A0A0F",
                        "form-bg": "#0F0F14",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .grid-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .blur-blob {
            filter: blur(120px);
            opacity: 0.15;
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
<div class="flex h-screen w-full">
<!-- Left Panel (55%) -->
<div class="relative hidden lg:flex w-[55%] flex-col items-center justify-center overflow-hidden bg-[#0A0A0F] border-r border-white/5">
<!-- Grid Background -->
<div class="absolute inset-0 grid-pattern"></div>
<!-- Gradient Blobs -->
<div class="absolute top-1/4 left-1/4 size-96 bg-primary rounded-full blur-blob"></div>
<div class="absolute bottom-1/4 right-1/4 size-96 bg-brand-blue rounded-full blur-blob"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 size-80 bg-primary/50 rounded-full blur-blob"></div>
<!-- Content -->
<div class="relative z-10 flex flex-col items-center text-center px-12">
<div class="mb-6 flex flex-col items-center">
<h1 class="text-6xl font-bold tracking-tighter text-white">RAMI</h1>
<div class="mt-2 h-1.5 w-24 rounded-full bg-gradient-to-r from-primary to-brand-blue"></div>
</div>
<p class="text-xl font-medium text-white/60 tracking-wide">L'IA qui vise juste.</p>
</div>
<!-- Abstract Image Decor -->
<div class="absolute bottom-12 left-12 right-12 flex justify-center opacity-20">
<div class="h-48 w-full max-w-md rounded-2xl border border-white/10 bg-gradient-to-br from-white/5 to-transparent backdrop-blur-sm" data-alt="Abstract neuro-network visualization with glowing nodes"></div>
</div>
</div>
<!-- Right Panel (45%) -->
<div class="flex w-full lg:w-[45%] flex-col items-center justify-center bg-[#0F0F14] px-6 py-12">
<!-- Mobile Logo -->
<div class="lg:hidden mb-8 flex flex-col items-center">
<h1 class="text-4xl font-bold text-white">RAMI</h1>
<div class="mt-1 h-1 w-16 rounded-full bg-gradient-to-r from-primary to-brand-blue"></div>
</div>
<!-- Card Container -->
<div class="w-full max-w-[440px] rounded-2xl border border-white/10 bg-white/[0.04] p-8 backdrop-blur-xl shadow-2xl">
<div class="mb-8">
<h2 class="text-[28px] font-semibold text-slate-50 leading-tight">Connexion</h2>
<p class="mt-2 text-base text-white/60">Bienvenue. Connectez-vous pour accéder à votre espace.</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-sm font-medium text-white/80 ml-1">Email</label>
<div class="relative">
<input class="w-full rounded-xl border border-white/[0.08] bg-white/[0.06] px-4 py-4 text-white placeholder-white/30 outline-none transition-all focus:border-primary/50 focus:ring-2 focus:ring-primary/20" placeholder="nom@exemple.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between ml-1">
<label class="text-sm font-medium text-white/80">Mot de passe</label>
<a class="text-xs text-primary hover:underline" href="#">Oublié ?</a>
</div>
<div class="relative flex items-center">
<input class="w-full rounded-xl border border-white/[0.08] bg-white/[0.06] px-4 py-4 text-white placeholder-white/30 outline-none transition-all focus:border-primary/50 focus:ring-2 focus:ring-primary/20" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-white/40 hover:text-white/70" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full rounded-xl bg-gradient-to-r from-primary to-brand-blue py-4 text-base font-bold text-white shadow-lg shadow-primary/20 transition-transform hover:scale-[1.01] active:scale-[0.99]" type="submit">
                        Se connecter
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-[#12121A] px-2 text-white/40">Ou continuer avec</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 rounded-xl border border-white/10 bg-transparent py-3 text-sm font-medium text-white hover:bg-white/5 transition-colors">
<svg class="h-5 w-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 rounded-xl border border-white/10 bg-transparent py-3 text-sm font-medium text-white hover:bg-white/5 transition-colors">
<svg class="h-5 w-5 fill-white" viewbox="0 0 24 24">
<path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"></path>
</svg>
                        GitHub
                    </button>
</div>
<!-- Footer -->
<p class="mt-8 text-center text-sm text-white/40">
                    Pas encore de compte ? 
                    <a class="font-semibold text-primary hover:text-primary/80 transition-colors ml-1" href="#">Créer un compte</a>
</p>
</div>
<!-- Bottom Legal -->
<div class="mt-12 flex gap-6 text-xs text-white/20">
<a class="hover:text-white/40 transition-colors" href="#">Conditions d'utilisation</a>
<a class="hover:text-white/40 transition-colors" href="#">Confidentialité</a>
</div>
</div>
</div>
</body></html>
