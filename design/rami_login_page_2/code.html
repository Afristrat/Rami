<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RAMI | Connexion - AI Agency OS</title>
<!-- Google Fonts: Inter & Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            brand: {
              violet: '#7C3AED',
              blue: '#2563EB',
              dark: '#0A0A0F',
              card: '#0F0F14',
            }
          }
        }
      }
    }
  </script>
<style data-purpose="layout">
    body {
      background-color: #0A0A0F;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Grid pattern for the left panel */
    .grid-overlay {
      background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Custom blurred blobs */
    .blob {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 1;
    }

    .blob-1 { background-color: #7C3AED; top: 10%; left: 10%; }
    .blob-2 { background-color: #2563EB; bottom: 20%; right: 20%; }
    .blob-3 { background-color: #7C3AED; top: 50%; left: 40%; }

    /* Floating label animations */
    .input-group label {
      transition: all 0.2s ease-out;
      pointer-events: none;
    }
    .input-field:focus ~ label,
    .input-field:not(:placeholder-shown) ~ label {
      transform: translateY(-24px) scale(0.85);
      color: #7C3AED;
    }
  </style>
</head>
<body class="font-sans text-white antialiased">
<!-- BEGIN: MainLayout -->
<main class="min-h-screen flex flex-col md:flex-row">
<!-- BEGIN: LeftPanel -->
<section class="hidden md:flex md:w-[55%] relative bg-[#0A0A0F] items-center justify-center overflow-hidden">
<!-- Grid Overlay -->
<div class="absolute inset-0 grid-overlay"></div>
<!-- Animated Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<!-- Content -->
<div class="relative z-10 text-center space-y-4">
<div class="inline-block">
<h1 class="font-heading text-6xl font-extrabold tracking-tighter text-white">
            RAMI
          </h1>
<div class="h-1.5 w-full bg-gradient-to-r from-brand-violet to-brand-blue rounded-full mt-2"></div>
</div>
<p class="text-white/60 text-xl font-medium">L'IA qui vise juste.</p>
</div>
</section>
<!-- END: LeftPanel -->
<!-- BEGIN: RightPanel -->
<section class="flex-1 bg-[#0F0F14] flex items-center justify-center p-6 sm:p-12">
<!-- BEGIN: LoginCard -->
<div class="w-full max-w-md bg-white/[0.04] backdrop-blur-xl border border-white/[0.08] rounded-2xl p-8 sm:p-10 shadow-2xl" data-purpose="login-card">
<!-- Header -->
<header class="mb-8">
<h2 class="text-[#F8FAFC] text-3xl font-semibold font-heading mb-2">Connexion</h2>
<p class="text-white/60">Bienvenue. Connectez-vous pour accéder à votre espace.</p>
</header>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="relative input-group">
<input class="input-field w-full px-4 py-4 bg-white/[0.06] border border-white/[0.08] rounded-xl text-white focus:outline-none focus:border-brand-violet transition-colors placeholder-transparent" id="email" placeholder=" " required="" type="email"/>
<label class="absolute left-4 top-4 text-white/40" for="email">Adresse e-mail</label>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="relative input-group">
<input class="input-field w-full px-4 py-4 bg-white/[0.06] border border-white/[0.08] rounded-xl text-white focus:outline-none focus:border-brand-violet transition-colors placeholder-transparent pr-12" id="password" placeholder=" " required="" type="password"/>
<label class="absolute left-4 top-4 text-white/40" for="password">Mot de passe</label>
<!-- Password Toggle Icon -->
<button class="absolute right-4 top-4 text-white/40 hover:text-white transition-colors" data-purpose="toggle-password" onclick="togglePasswordVisibility()" type="button">
<svg class="w-6 h-6" fill="none" id="eye-icon" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
<div class="flex justify-end">
<a class="text-sm font-medium text-[#7C3AED] hover:text-brand-violet/80 transition-colors" href="#">
                Mot de passe oublié ?
              </a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-gradient-to-r from-brand-violet to-brand-blue hover:opacity-90 text-white font-bold rounded-xl transition-all shadow-lg shadow-brand-violet/20" type="submit">
            Se connecter
          </button>
<!-- Divider -->
<div class="relative flex items-center gap-4 py-2">
<div class="flex-grow border-t border-white/10"></div>
<span class="text-white/40 text-sm font-medium">ou</span>
<div class="flex-grow border-t border-white/10"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-white/10 rounded-xl hover:bg-white/[0.05] transition-colors font-medium" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.25.81-.59z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
</svg>
              Google
            </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-white/10 rounded-xl hover:bg-white/[0.05] transition-colors font-medium" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" fill="currentColor"></path>
</svg>
              GitHub
            </button>
</div>
</form>
<!-- Footer -->
<footer class="mt-8 text-center">
<p class="text-white/60 text-sm">
            Pas encore de compte ? 
            <a class="text-[#7C3AED] font-semibold hover:underline" href="#">Créer un compte</a>
</p>
</footer>
</div>
<!-- END: LoginCard -->
</section>
<!-- END: RightPanel -->
</main>
<!-- END: MainLayout -->
<script data-purpose="event-handlers">
    /**
     * Toggles the visibility of the password input
     */
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        // Eye-off state icon
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
        `;
      } else {
        passwordInput.type = 'password';
        // Eye-on state icon
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        `;
      }
    }
  </script>
</body></html>
