name: CI/CD Pipeline
# Conforme CLAUDE.md §5.5 — pipeline qualité + déploiement production

on:
  push:
    branches: [main, develop, "j*-*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Étape 1 : Qualité du code ──────────────────────────────────────────────
  quality:
    name: Qualité (lint + typecheck + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lint (zéro erreur obligatoire)
        run: npm run lint -- --max-warnings=0

      - name: TypeCheck (zéro erreur obligatoire)
        run: npm run typecheck

      - name: Audit sécurité (bloque si vulnérabilité critique)
        run: npm audit --audit-level=critical

  # ── Étape 2 : Tests unitaires ─────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires (Jest)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Tests unitaires
        run: npm test -- --coverage --ci

      - name: Upload couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Étape 3 : Build de production ─────────────────────────────────────────
  build:
    name: Build production
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: https://app.posthog.com
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Build Next.js production
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ── Étape 4 : Tests E2E Playwright ────────────────────────────────────────
  # Tests E2E « hermétiques » : tournent contre un Supabase local ÉPHÉMÈRE
  # (provisionné par la CLI, migrations + seed appliqués au démarrage). Aucune
  # dépendance à un secret externe → déterministe et reproductible. Le serveur
  # Next est démarré par le `webServer` de playwright.config.ts (`npm run dev`),
  # donc l'artefact de build n'est PAS nécessaire ici.
  e2e:
    name: Tests E2E (Playwright — hermétique)
    runs-on: ubuntu-latest
    needs: quality
    # NON bloquant (informatif) : l'historique des migrations n'est pas rejouable
    # from-scratch (la prod a divergé — ex. table média retirée, stockage MinIO).
    # Tant que la baseline n'est pas régénérée depuis le schéma de prod, ce job
    # reste informatif. Voir le ticket « baseline migrations depuis la prod ».
    continue-on-error: true
    env:
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Installer Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Installer la CLI Supabase
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Démarrer Supabase local (éphémère)
        run: supabase start

      - name: Exporter les clés Supabase locales vers l'environnement
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=$(supabase status -o json | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"

      - name: Tests E2E hermétiques (exclut Stripe/OAuth)
        run: |
          FILES=$(ls tests/e2e/*.spec.ts | grep -vE '/(billing|connections)\.spec\.ts$' | tr '\n' ' ')
          echo "Specs hermétiques exécutées : $FILES"
          npx playwright test --project=chromium $FILES
        env:
          CI: true

      - name: Arrêter Supabase
        if: always()
        run: supabase stop || true

      - name: Upload rapport Playwright
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Tests E2E à dépendances EXTERNES (Stripe, OAuth fournisseurs) — NON bloquant
  # tant que les secrets correspondants ne sont pas configurés dans le repo.
  # Volontairement HORS du `needs` de `deploy` + `continue-on-error` → informatif.
  e2e-external:
    name: Tests E2E externes (Stripe/OAuth — non bloquant)
    runs-on: ubuntu-latest
    needs: quality
    continue-on-error: true
    env:
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Installer Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Installer la CLI Supabase
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Démarrer Supabase local (éphémère)
        run: supabase start

      - name: Exporter les clés Supabase locales vers l'environnement
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=$(supabase status -o json | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"

      - name: Tests E2E externes (peuvent échouer sans secrets Stripe/OAuth)
        run: npx playwright test --project=chromium tests/e2e/billing.spec.ts tests/e2e/connections.spec.ts
        env:
          CI: true

      - name: Arrêter Supabase
        if: always()
        run: supabase stop || true

  # ── Étape 5 : Déploiement production (main uniquement) ────────────────────
  # Coolify (serveur Ubuntu self-hosted) construit l'image depuis le Dockerfile.
  # Deux modes possibles :
  #   A. Auto-deploy Coolify sur push (recommandé) → ce job sert juste de smoke test.
  #   B. Déclenchement explicite via webhook Coolify (secret COOLIFY_DEPLOY_WEBHOOK).
  deploy:
    name: Déploiement Coolify (production)
    runs-on: ubuntu-latest
    # E2E retiré du gate de déploiement (informatif tant que la baseline de
    # migrations n'est pas régénérée depuis la prod). Le build sert de smoke test.
    needs: [unit-tests, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      # Le contexte `secrets` n'est PAS autorisé dans les conditions `if:` (rejet du
      # workflow au parsing → « workflow file issue », aucun job ne démarre). On mappe
      # le secret en variable d'environnement de job pour pouvoir le tester via `env`.
      COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Déclencher le déploiement Coolify (webhook)
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK != '' }}
        run: |
          curl -fsS -X GET "$COOLIFY_DEPLOY_WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN"
          echo "Déploiement Coolify déclenché."

      - name: Attendre la disponibilité puis smoke tests
        run: |
          sleep 45
          npx tsx scripts/smoke-test.ts "${{ vars.PRODUCTION_URL }}"
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.PRODUCTION_URL }}
