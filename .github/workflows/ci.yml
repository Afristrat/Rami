name: CI/CD Pipeline
# Conforme CLAUDE.md §5.5 — pipeline qualité + déploiement production

on:
  push:
    branches: [main, develop, "j*-*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Étape 1 : Qualité du code ──────────────────────────────────────────────
  quality:
    name: Qualité (lint + typecheck + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lint (zéro erreur obligatoire)
        run: npm run lint -- --max-warnings=0

      - name: TypeCheck (zéro erreur obligatoire)
        run: npm run typecheck

      - name: Audit sécurité (bloque si vulnérabilité critique)
        run: npm audit --audit-level=critical

  # ── Étape 2 : Tests unitaires ─────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires (Jest)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Tests unitaires
        run: npm test -- --coverage --ci

      - name: Upload couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Étape 3 : Build de production ─────────────────────────────────────────
  build:
    name: Build production
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: https://app.posthog.com
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Build Next.js production
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ── Étape 4 : Tests E2E Playwright ────────────────────────────────────────
  e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    env:
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Installer Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Télécharger le build
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Tests E2E (Chromium uniquement en CI)
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload rapport Playwright
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Étape 5 : Déploiement production (main uniquement) ────────────────────
  deploy:
    name: Déploiement Vercel (production)
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Déployer sur Vercel (production)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | tail -1)
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke tests post-déploiement
        run: npx tsx scripts/smoke-test.ts ${{ steps.deploy.outputs.url }}
        env:
          NEXT_PUBLIC_APP_URL: ${{ steps.deploy.outputs.url }}
